name: Auto Changelog and README

on:
  create:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"
      - "release/**"
    paths-ignore:
      - "CHANGE-LOG.md"
      - "README.md"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Update changelog
        shell: pwsh
        run: ./.github/scripts/Update-Changelog.ps1

      - name: Update README latest changes
        shell: pwsh
        run: ./.github/scripts/Update-ReadmeChanges.ps1

      - name: Commit and push
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if [ -n "$(git status --porcelain CHANGE-LOG.md README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGE-LOG.md README.md
            git commit -m "chore(auto): sync changelog and readme [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
