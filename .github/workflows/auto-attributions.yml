name: Auto Attributions

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"
      - "release/**"
    paths:
      - "files/resources/**"
      - "files/assets/**"
      - "**/*.bib"
      - "**/*.attribution"
    paths-ignore:
      - "ATTRIBUTIONS.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-attributions:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update attributions
        shell: pwsh
        run: ./.github/scripts/Update-Attributions.ps1

      - name: Commit and push
        shell: bash
        run: |
          if [ -n "$(git status --porcelain ATTRIBUTIONS.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ATTRIBUTIONS.md
            git commit -m "chore(auto): refresh attributions from resources [skip ci]"
            git push
          else
            echo "No attributions changes to commit"
          fi
